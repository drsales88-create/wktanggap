<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <title>Document</title>
<style>
body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

.container{
max-width:400px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.preview{
margin:15px 0;
}

.preview img{
width:100%;

object-fit:cover;

}

button{
width:100%;

}

</style>
</head>

<p id="nama"></p>

<body>
    <div class="container">
<button onclick="absenPulang()">Absen Pulang</button>
<br><br>
 <a href="home.html" style="font-size:20px;">Kembali</a>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>


<script>
function absenPulang(){

    const now = new Date();
    const tanggal = now.getDate().toString().padStart(2,'0') +
                    (now.getMonth() + 1).toString().padStart(2,'0') +
                    now.getFullYear();

  // ambil jam WIB
const formatter = new Intl.DateTimeFormat('id-ID', {
    timeZone: 'Asia/Jakarta',
    hour: '2-digit',
    minute: '2-digit',
    second: '2-digit',
    hour12: false
});

const parts = formatter.formatToParts(now);

let jam = parts.find(p => p.type === 'hour').value;
let menit = parts.find(p => p.type === 'minute').value;
let detik = parts.find(p => p.type === 'second').value;

const hour = parseInt(jam);

// validasi pulang
if (hour < 17) {
    Swal.fire({
        icon: 'warning',
        title: 'Belum waktunya pulang!',
        text: 'Absensi pulang hanya bisa setelah jam 17:00 WIB',
        confirmButtonText: 'OK'
    }).then(() => {
        window.location.href = "home.html";
    });
    return;
}

// waktu pulang (WIB)
const waktu = `${jam}:${menit}:${detik} WIB`;

    // 🔥 Firebase config
    const firebaseConfig = {
       apiKey: "AIzaSyCllT1xEA0kLnT2ceLkQgNrhSsAbvUkaxo",
            authDomain: "item-pekerjaan-84734.firebaseapp.com",
            databaseURL: "https://item-pekerjaan-84734-default-rtdb.firebaseio.com",
            projectId: "item-pekerjaan-84734",
            storageBucket: "item-pekerjaan-84734.firebasestorage.app",
            messagingSenderId: "1090276765966",
            appId: "1:1090276765966:web:8eea263c163d81aa45a75f",
            measurementId: "G-TKNH3Y5C3X"
    };

    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }

    const db = firebase.database();

    const nama = localStorage.getItem("username");
    const tanggalInput = now.getDate()+String(new Date().getMonth() + 1).padStart(2,'0')+now.getFullYear();

    if (!nama) {
        alert("Username tidak ditemukan!");
        return;
    }

    // 🔍 ambil data dari check
    db.ref("absen/" + tanggalInput + "/" + nama).once("value", function(snapshot){

    if(snapshot.exists()){

        const data = snapshot.val();

        // ambil value lama
        const namaVal   = data.nama;
        const photoVal  = data.photo;
        const pulangVal = data.pulang;
        const dateVal   = data.date;
        const waktuVal  = data.waktu;
    
        const wib = " wib";
        const waktuInput =  now.getHours() + ":" + String(new Date().getMinutes()).padStart(2, '0') + ":" + now.getSeconds()+ wib;
       

        // contoh update (ubah pulang & waktu saja)
        const updateData = {
            nama: namaVal,
            photo: photoVal,
            date: dateVal,
            waktu: waktuVal, 
            pulang: waktuInput
        };

        // 🚀 update ke Firebase
        db.ref("absen/" + tanggalInput + "/" + nama).update(updateData);
        db.ref("periode/" + nama + "/" + tanggalInput).update(updateData);
        Swal.fire({
                        icon: "success",
                        title: "Berhasil di Update",
                        text: "Terima kasih, sampai jumpa kembali besok !!",
                        confirmButtonText: "Ok",
                        confirmButtonColor: "#2196F3"
                    }).then(() => {
                        window.location.href = "home.html";
                    });
    } else {
        alert("Data tidak ditemukan");
    }

});

   
}
</script>

</body>
</html>
